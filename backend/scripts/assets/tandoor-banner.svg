<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a140a"/>
      <stop offset="45%" stop-color="#8a2c0f"/>
      <stop offset="100%" stop-color="#d9631e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flameB" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffce6b"/>
      <stop offset="45%" stop-color="#f7941d"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bgB)"/>
  <rect width="1600" height="500" fill="url(#glow)"/>

  <!-- decorative rings, full width so they read as texture at any crop -->
  <circle cx="800" cy="250" r="330" fill="none" stroke="#fdf3e3" stroke-opacity="0.06" stroke-width="30"/>
  <circle cx="800" cy="250" r="230" fill="none" stroke="#fdf3e3" stroke-opacity="0.09" stroke-width="16"/>

  <!--
    Everything that matters (flame + wordmark) is centered on x=800 (the
    image's horizontal midpoint). object-cover always crops around the
    center, so keeping the core content within roughly the middle 480px
    means it survives even the tightest mobile crop (short wide banner
    squeezed into a narrow, tall phone frame).
  -->
  <g transform="translate(800,108) scale(0.85)">
    <path d="M0 -80
             C -24 -44, -42 -20, -42 12
             C -42 42, -22 62, 0 62
             C 22 62, 42 42, 42 12
             C 42 -12, 28 -30, 14 -50
             C 16 -30, 6 -22, -2 -26
             C -10 -30, -8 -46, 0 -64
             C -4 -72, 0 -80, 0 -80 Z"
          fill="url(#flameB)" transform="translate(0,80)"/>
    <path d="M0 66
             C -10 82, -16 96, -16 110
             C -16 126, -9 136, 0 136
             C 9 136, 16 126, 16 110
             C 16 98, 10 88, 2 78
             C 3 88, -3 92, -7 88
             C -10 84, -6 74, 0 66 Z"
          fill="#3a140a" fill-opacity="0.35"/>
  </g>

  <text x="800" y="290" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="74"
        font-weight="700" letter-spacing="5" fill="#fdf3e3">TANDOOR</text>

  <rect x="700" y="312" width="200" height="3" fill="#fdf3e3" fill-opacity="0.6"/>

  <text x="800" y="352" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="24"
        letter-spacing="1.5" fill="#fdf3e3" fill-opacity="0.85">Sizzling flavors, delivered hot</text>
</svg>
